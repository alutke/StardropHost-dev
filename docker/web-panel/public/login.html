<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StardropHost — Login</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script>
    (() => {
      const saved = localStorage.getItem('panel_theme');
      const theme = saved === 'light' || saved === 'dark'
        ? saved
        : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <style>
    /* ── Dark theme (default) ── */
    :root {
      --bg-primary:  #12101a;
      --bg-card:     #1c1828;
      --bg-field:    #261f35;
      --bg-overlay:  rgba(167,139,250,0.08);
      --text-primary:   #ede9f8;
      --text-secondary: #9e93c8;
      --text-muted:     #6b5f8a;
      --border:      #2e2545;
      --accent:      #a78bfa;
      --accent-dark: #7c3aed;
      --accent-error:#ef4444;
      --shadow:      0 20px 60px rgba(0,0,0,0.5);
    }
    /* ── Light theme ── */
    :root[data-theme='light'] {
      --bg-primary:  #f3f0fb;
      --bg-card:     #ffffff;
      --bg-field:    #ece8f8;
      --bg-overlay:  rgba(124,58,237,0.08);
      --text-primary:   #1e1535;
      --text-secondary: #5b4d80;
      --text-muted:     #8b7aaa;
      --border:      #d4cdf0;
      --accent:      #7c3aed;
      --accent-dark: #6d28d9;
      --accent-error:#dc2626;
      --shadow:      0 18px 40px rgba(30,21,53,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(167,139,250,0.1), transparent 34%),
        var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 0.2s, color 0.2s;
    }

    .icon {
      width: 20px; height: 20px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .login-container {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.9;
    }

    .top-actions {
      position: absolute;
      top: 16px; right: 16px;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: 999px;
      padding: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 56px; height: 56px;
      color: var(--accent);
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-mark .icon { width: 100%; height: 100%; }

    .login-logo h1 { font-size: 22px; color: var(--accent); }
    .login-logo p  { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }

    .auth-copy { margin-bottom: 20px; }
    .auth-copy h2 { font-size: 21px; margin-bottom: 6px; }
    .auth-copy p  { color: var(--text-secondary); font-size: 14px; line-height: 1.5; }

    .feedback {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .feedback.show  { display: block; }
    .feedback.error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--accent-error);
    }
    .feedback.success {
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.25);
      color: var(--accent);
    }

    .loading-state { color: var(--text-secondary); font-size: 14px; margin-bottom: 16px; }
    .auth-form.hidden, .loading-state.hidden { display: none; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-field);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
    }

    .validation-list {
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin: -4px 0 18px;
      display: grid;
      gap: 10px;
    }
    .rule {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-secondary); font-size: 13px;
    }
    .rule-dot {
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .rule.valid             { color: var(--accent); }
    .rule.valid .rule-dot   { background: var(--accent); box-shadow: 0 0 0 4px rgba(167,139,250,0.12); }
    .rule.invalid           { color: var(--accent-error); }
    .rule.invalid .rule-dot { background: var(--accent-error); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none; border-radius: 8px;
      color: #12101a;
      font-size: 16px; font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .login-btn:hover    { background: var(--accent-dark); transform: translateY(-1px); }
    .login-btn:disabled { background: var(--bg-field); color: var(--text-muted); cursor: not-allowed; transform: none; }

    .login-container.success-pulse { animation: successPulse 0.7s ease; }
    @keyframes successPulse {
      0%   { box-shadow: var(--shadow); }
      50%  { box-shadow: 0 20px 70px rgba(167,139,250,0.35); }
      100% { box-shadow: var(--shadow); }
    }

    @media (max-width: 480px) {
      .login-container { padding: 52px 22px 28px; }
    }
  </style>
</head>
<body>

  <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <symbol id="icon-logo" viewBox="0 0 100 100">
      <image href="/favicon.png" x="0" y="0" width="100" height="100"/>
    </symbol>
    <symbol id="icon-theme-light" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2.5v2.2"/><path d="M12 19.3v2.2"/>
        <path d="m4.9 4.9 1.6 1.6"/><path d="m17.5 17.5 1.6 1.6"/>
        <path d="M2.5 12h2.2"/><path d="M19.3 12h2.2"/>
        <path d="m4.9 19.1 1.6-1.6"/><path d="m17.5 6.5 1.6-1.6"/>
      </g>
    </symbol>
    <symbol id="icon-theme-dark" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.5 14.5a6.8 6.8 0 1 1-9-9 7.6 7.6 0 0 0 9 9Z"/>
      </g>
    </symbol>
  </svg>

  <div class="login-container" id="loginContainer">

    <div class="top-actions">
      <button class="theme-toggle" id="themeToggle" type="button" title="Toggle theme">
        <svg class="icon"><use href="#icon-theme-light"></use></svg>
      </button>
    </div>

    <div class="login-logo">
      <div class="logo-mark"><svg class="icon"><use href="#icon-logo"></use></svg></div>
      <h1>StardropHost</h1>
      <p>Server Management Panel</p>
    </div>

    <div class="auth-copy">
      <h2 id="formTitle">...</h2>
      <p id="formSubtitle">...</p>
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="loadingState" class="loading-state">Checking panel status...</div>

    <!-- Login form -->
    <form id="loginForm" class="auth-form hidden" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username"
               autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter panel password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>

    <!-- First-run setup form -->
    <form id="setupForm" class="auth-form hidden" onsubmit="handleSetup(event)">
      <div class="form-group">
        <label for="setupUsername">Username</label>
        <input type="text" id="setupUsername" placeholder="Choose a username"
               autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="setupPassword">Password</label>
        <input type="password" id="setupPassword" placeholder="Choose a password"
               autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password"
               autocomplete="new-password" required>
      </div>
      <div class="validation-list">
        <div class="rule" id="ruleUsername">
          <span class="rule-dot"></span>
          <span>Username at least 3 characters (letters, numbers, _ . -)</span>
        </div>
        <div class="rule" id="ruleLength">
          <span class="rule-dot"></span>
          <span>Password at least 8 characters</span>
        </div>
        <div class="rule" id="ruleMatch">
          <span class="rule-dot"></span>
          <span>Passwords match</span>
        </div>
      </div>
      <button type="submit" class="login-btn" id="setupBtn" disabled>Get Started</button>
    </form>

  </div>

  <script>
    let currentMode  = 'loading';
    let currentTheme = detectTheme();

    function detectTheme() {
      const saved = localStorage.getItem('panel_theme');
      if (saved === 'light' || saved === 'dark') return saved;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme() {
      document.documentElement.dataset.theme = currentTheme;
      const use = document.querySelector('#themeToggle use');
      if (use) use.setAttribute('href', currentTheme === 'dark' ? '#icon-theme-light' : '#icon-theme-dark');
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('loginForm').classList.toggle('hidden', mode !== 'login');
      document.getElementById('setupForm').classList.toggle('hidden', mode !== 'setup');

      if (mode === 'login') {
        document.getElementById('formTitle').textContent    = 'Sign In';
        document.getElementById('formSubtitle').textContent = 'Enter your admin credentials to continue.';
        document.title = 'StardropHost — Login';
        document.getElementById('loginUsername').focus();
      } else {
        document.getElementById('formTitle').textContent    = 'Create Admin Account';
        document.getElementById('formSubtitle').textContent = 'First time setup — choose your username and password.';
        document.title = 'StardropHost — Setup';
        document.getElementById('setupUsername').focus();
      }
    }

    function setFeedback(message, type = 'error') {
      const el = document.getElementById('feedback');
      el.textContent = message;
      el.className   = `feedback show ${type}`;
    }

    function clearFeedback() {
      const el = document.getElementById('feedback');
      el.className   = 'feedback';
      el.textContent = '';
    }

    function updateSetupValidation() {
      const user    = document.getElementById('setupUsername').value;
      const pw      = document.getElementById('setupPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      const hasUsername = user.length >= 3 && /^[a-zA-Z0-9_.-]+$/.test(user);
      const hasLength   = pw.length >= 8;
      const hasMatch    = confirm.length > 0 && pw === confirm;

      document.getElementById('ruleUsername').className =
        `rule ${user    ? (hasUsername ? 'valid' : 'invalid') : ''}`.trim();
      document.getElementById('ruleLength').className =
        `rule ${pw      ? (hasLength   ? 'valid' : 'invalid') : ''}`.trim();
      document.getElementById('ruleMatch').className  =
        `rule ${confirm ? (hasMatch    ? 'valid' : 'invalid') : ''}`.trim();

      document.getElementById('setupBtn').disabled = !(hasUsername && hasLength && hasMatch);
    }

    async function request(url, options = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      let data = {};
      try { data = await res.json(); } catch {}
      return { res, data };
    }

    async function verifyExistingToken() {
      const token = localStorage.getItem('panel_token');
      if (!token) return false;
      try {
        const { res } = await request('/api/auth/verify', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.ok) {
          setFeedback('Verified. Redirecting...', 'success');
          window.location.href = '/';
          return true;
        }
      } catch {}
      return false;
    }

    async function initializePage() {
      applyTheme();
      try {
        const { res, data } = await request('/api/auth/status');
        if (!res.ok) throw new Error();
        if (data.needsSetup) { setMode('setup'); return; }
        setMode('login');
        await verifyExistingToken();
      } catch {
        setMode('login');
        setFeedback('Connection failed. Make sure the panel service is running.', 'error');
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearFeedback();

      const btn = document.getElementById('loginBtn');
      const user = document.getElementById('loginUsername').value;
      const pw   = document.getElementById('password').value;

      btn.disabled    = true;
      btn.textContent = 'Logging in...';

      try {
        const { res, data } = await request('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username: user, password: pw }),
        });

        if (res.ok) {
          localStorage.setItem('panel_token', data.token);
          window.location.href = '/';
          return;
        }

        if (data.needsSetup) { setMode('setup'); return; }

        let msg = data.error || 'Login failed';
        if (data.attemptsRemaining !== undefined) msg += ` (${data.attemptsRemaining} attempts left)`;
        setFeedback(msg, 'error');
      } catch {
        setFeedback('Connection failed. Make sure the panel service is running.', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Login';
      }
    }

    async function handleSetup(event) {
      event.preventDefault();
      clearFeedback();
      updateSetupValidation();

      const user    = document.getElementById('setupUsername').value;
      const pw      = document.getElementById('setupPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const btn     = document.getElementById('setupBtn');

      if (btn.disabled) return;

      btn.disabled    = true;
      btn.textContent = 'Setting up...';

      let redirect = false;
      try {
        const { res, data } = await request('/api/auth/setup', {
          method: 'POST',
          body: JSON.stringify({ username: user, password: pw, confirmPassword: confirm }),
        });

        if (res.ok) {
          localStorage.setItem('panel_token', data.token);
          document.getElementById('loginContainer').classList.add('success-pulse');
          setFeedback('Password set. Redirecting...', 'success');
          redirect = true;
          setTimeout(() => { window.location.href = '/'; }, 900);
        } else {
          if (res.status === 403) setMode('login');
          setFeedback(data.error || 'Setup failed', 'error');
        }
      } catch {
        setFeedback('Connection failed. Make sure the panel service is running.', 'error');
      } finally {
        if (!redirect) {
          updateSetupValidation();
          btn.textContent = 'Get Started';
        }
      }
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('panel_theme', currentTheme);
      applyTheme();
    });

    document.getElementById('setupUsername').addEventListener('input',  updateSetupValidation);
    document.getElementById('setupPassword').addEventListener('input',  updateSetupValidation);
    document.getElementById('confirmPassword').addEventListener('input', updateSetupValidation);

    initializePage();
  </script>
</body>
</html>
