# ===========================================
# StardropHost | docker-compose.yml
# ===========================================
# Just run:
#   docker compose up -d
# ===========================================

services:

  # --- Manager ---
  # Sidecar container, gives web panel the
  # ability to start/stop/restart the server
  stardrop-manager:
    build: ./docker/manager
    image: stardrop-manager:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-manager
    restart: unless-stopped
    environment:
      - PROJECT_DIR=${PWD}
      - COMPOSE_FILE=${PWD}/docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}:ro
    networks:
      - internal

  # --- Init ---
  # Runs once on startup as root to create
  # data directories and fix file permissions
  # (UID 1000:1000) then exits. This prevents
  # disk write errors on first run.
  stardrop-init:
    build: ./docker
    image: stardrop-server:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-init
    user: root
    entrypoint: ["/home/steam/scripts/init-container.sh"]
    environment:
      - USE_GPU=${USE_GPU:-false}
    volumes:
      - ./data/saves:/home/steam/.config/StardewValley:rw
      - ./data/game:/home/steam/stardewvalley:rw
      - ./data/logs:/home/steam/.local/share/stardrop/logs:rw
      - ./data/backups:/home/steam/.local/share/stardrop/backups:rw
      - ./data/panel:/home/steam/web-panel/data:rw
    networks:
      - internal

  # --- Server ---
  # Main container, runs Stardew Valley + SMAPI
  # + web panel + all background services.
  # Connected to both networks:
  #   macvlan  — own LAN IP, game port directly accessible (no NAT)
  #   internal — reaches manager + steam-auth by service name
  stardrop-server:
    build: ./docker
    image: stardrop-server:local
    container_name: ${CONTAINER_PREFIX:-stardrop}
    restart: unless-stopped
    depends_on:
      stardrop-manager:
        condition: service_started
      stardrop-init:
        condition: service_completed_successfully
    environment:
      - USE_GPU=${USE_GPU:-false}
      - LOW_PERF_MODE=${LOW_PERF_MODE:-false}
      - ENABLE_VNC=${ENABLE_VNC:-false}
      - VNC_PASSWORD=${VNC_PASSWORD:-stardew1}
      - ENABLE_AUTO_BACKUP=${ENABLE_AUTO_BACKUP:-false}
      - ENABLE_CRASH_RESTART=${ENABLE_CRASH_RESTART:-false}
      - ENABLE_LOG_MONITOR=${ENABLE_LOG_MONITOR:-false}
      - METRICS_PORT=${METRICS_PORT:-9090}
      - PUBLIC_IP=${PUBLIC_IP:-}
      - SERVER_PASSWORD=${SERVER_PASSWORD:-}
      - SAVE_NAME=${SAVE_NAME:-}
      - PANEL_PORT=${PANEL_PORT:-18642}
      - SERVER_MODE=${SERVER_MODE:-lan}
    volumes:
      - ./data/saves:/home/steam/.config/StardewValley:rw
      - ./data/game:/home/steam/stardewvalley:rw
      - ./data/logs:/home/steam/.local/share/stardrop/logs:rw
      - ./data/backups:/home/steam/.local/share/stardrop/backups:rw
      - ./data/panel:/home/steam/web-panel/data:rw
      - ./data/custom-mods:/home/steam/custom-mods:ro
      - ${PWD}/..:/host-parent:ro
    networks:
      internal: {}
      macvlan:
        ipv4_address: ${CONTAINER_IP}

  # --- Steam Auth ---
  # Handles Steam login + 2FA for game download via the wizard.
  # Credentials are memory-only — never stored to disk.
  # Internal network only — never exposed externally.
  stardrop-steam-auth:
    build: ./docker/steam-auth
    image: stardrop-steam-auth:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-steam-auth
    restart: unless-stopped
    environment:
      - STEAM_AUTH_PORT=18700
    networks:
      - internal

# ─── Networks ────────────────────────────────────────────────────────
#
# macvlan  — gives stardrop-server its own LAN IP address.
#            Game port 24642/udp, web panel, VNC are all directly
#            accessible on CONTAINER_IP with no port mapping or NAT.
#            Multiple instances can run on the same host — each just
#            needs a unique CONTAINER_IP.
#
# internal — private bridge for inter-container communication.
#            Manager, init, steam-auth are isolated from the LAN.
#            stardrop-server reaches them by service name via Docker DNS.
#
networks:
  internal:
    driver: bridge

  macvlan:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE:-eth0}
    ipam:
      config:
        - subnet: ${LAN_SUBNET:-192.168.1.0/24}
          gateway: ${LAN_GATEWAY:-192.168.1.1}
