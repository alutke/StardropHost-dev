# ===========================================
# StardropHost | docker-compose.yml
# ===========================================
# Just run:
#   docker compose up -d
# ===========================================

networks:
  stardrop-net:
    name: ${CONTAINER_PREFIX:-stardrop}-net
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-172.30.0.0/24}

services:

  # --- Manager ---
  # Sidecar container, gives web panel the
  # ability to start/stop/restart the server
  stardrop-manager:
    build: ./docker/manager
    image: stardrop-manager:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-manager
    restart: unless-stopped
    networks:
      - stardrop-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - PROJECT_DIR=${PWD}
      - COMPOSE_FILE=${PWD}/docker-compose.yml
      - CONTAINER_PREFIX=${CONTAINER_PREFIX:-stardrop}
      - MANAGER_SECRET=${MANAGER_SECRET:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}

  # --- Init ---
  # Runs once on startup as root to create
  # data directories and fix file permissions
  # (UID 1000:1000) then exits. This prevents
  # disk write errors on first run.
  stardrop-init:
    build: ./docker
    image: stardrop-server:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-init
    user: root
    entrypoint: ["/home/steam/scripts/init-container.sh"]
    networks:
      - stardrop-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - USE_GPU=${USE_GPU:-false}
    volumes:
      - ./data/saves:/home/steam/.config/StardewValley:rw
      - ./data/game:/home/steam/stardewvalley:rw
      - ./data/logs:/home/steam/.local/share/stardrop/logs:rw
      - ./data/backups:/home/steam/.local/share/stardrop/backups:rw
      - ./data/panel:/home/steam/web-panel/data:rw

  # --- Server ---
  # Main container, runs Stardew Valley + SMAPI
  # + web panel + all background services
  stardrop-server:
    build: ./docker
    image: stardrop-server:local
    container_name: ${CONTAINER_PREFIX:-stardrop}
    restart: unless-stopped
    networks:
      stardrop-net:
        ipv4_address: ${SERVER_IP:-172.30.0.10}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      stardrop-manager:
        condition: service_started
      stardrop-init:
        condition: service_completed_successfully
    environment:
      - USE_GPU=${USE_GPU:-false}
      - ENABLE_VNC=${ENABLE_VNC:-false}
      - MANAGER_SECRET=${MANAGER_SECRET:-}
      - VNC_PASSWORD=${VNC_PASSWORD:-stardew1}
      - DISPLAY_PRESET=${DISPLAY_PRESET:-800x600@30}
      - ENABLE_AUTO_BACKUP=${ENABLE_AUTO_BACKUP:-true}
      - ENABLE_CRASH_RESTART=${ENABLE_CRASH_RESTART:-true}
      - ENABLE_LOG_MONITOR=${ENABLE_LOG_MONITOR:-true}
      - METRICS_PORT=${METRICS_PORT:-9090}
      - SERVER_PASSWORD=${SERVER_PASSWORD:-}
      - SAVE_NAME=${SAVE_NAME:-}
      - PANEL_PORT=${PANEL_PORT:-18642}
      - GAME_PORT=${GAME_PORT:-24642}
      - SERVER_MODE=${SERVER_MODE:-lan}
      - STEAM_AUTH_URL=http://stardrop-steam-auth:18700
      - CPU_LIMIT=${CPU_LIMIT:-}
      - MEMORY_LIMIT=${MEMORY_LIMIT:-}
    ports:
      - "${GAME_PORT:-24642}:24642/udp"
      - "${VNC_PORT:-5900}:5900"
      - "${METRICS_PORT:-9090}:9090"
      - "${PANEL_PORT:-18642}:${PANEL_PORT:-18642}"
    volumes:
      - ./data/saves:/home/steam/.config/StardewValley:rw
      - ./data/game:/home/steam/stardewvalley:rw
      - ./data/logs:/home/steam/.local/share/stardrop/logs:rw
      - ./data/backups:/home/steam/.local/share/stardrop/backups:rw
      - ./data/panel:/home/steam/web-panel/data:rw
      - ./data/custom-mods:/home/steam/custom-mods:rw
      - ${PWD}/..:/host-parent:ro
      - /proc:/host-proc:ro
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-0}'
          memory: '${MEMORY_LIMIT:-0}'

  # --- Steam Auth ---
  # Handles Steam login + 2FA for game download via the wizard.
  # Credentials are memory-only — never stored to disk.
  # Port 18700 is intentionally NOT exposed to host.
  stardrop-steam-auth:
    build: ./docker/steam-auth
    image: stardrop-steam-auth:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-steam-auth
    restart: no
    profiles:
      - steam-auth
    networks:
      - stardrop-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - STEAM_AUTH_PORT=18700

  # --- GOG Downloader ---
  # Downloads/updates Stardew Valley from GOG.
  # Credentials are ephemeral — stored in the container's /Configs only
  # while it runs. /Configs is NOT mounted to the host so tokens are
  # gone the moment the container stops. restart: no, started on-demand.
  # Port 18701 is intentionally NOT exposed to host.
  stardrop-gog-downloader:
    build:
      context: .
      dockerfile: docker/gog-downloader/Dockerfile
    image: stardrop-gog-downloader:local
    container_name: ${CONTAINER_PREFIX:-stardrop}-gog-downloader
    restart: no
    profiles:
      - gog-downloader
    networks:
      - stardrop-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - GOG_AUTH_PORT=18701
    volumes:
      - ./data/game:/Downloads
