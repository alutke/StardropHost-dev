name: Build and Publish Images
# Builds and pushes images to GHCR for external Compose deployment.
# Compatible with Dockhand, Portainer, Dockge, Compose over SSH,
# Docker contexts, and any tool that deploys a Compose file.

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: alutke

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push manager image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/manager
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev-manager:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev-manager:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push steam-auth image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/steam-auth
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev-steam-auth:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev-steam-auth:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gog-downloader image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/gog-downloader/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev-gog-downloader:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/stardrophost-dev-gog-downloader:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
